<!DOCTYPE html>
<html>
<head>
    <title>Knowledge Base</title>
    <style>
        body {
            font-family: Arial;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .upload-section {
            border: 2px dashed #ccc;
            padding: 30px;
            text-align: center;
            margin-bottom: 30px;
        }
        .document {
            border: 1px solid #ddd;
            padding: 15px;
            margin: 10px 0;
            border-radius: 5px;
        }
        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>
    <h1> Knowledge Base</h1>
    
    <div class="upload-section">
        <h2>Upload Document</h2>
        <input type="file" id="fileInput" accept=".pdf,.txt">
        <br><br>
        <button onclick="uploadFile()">Upload</button>
        <p id="uploadStatus"></p>
    </div>

    <div style="margin-bottom: 20px;">
        <input type="text" id="searchInput" placeholder="Search documents..." style="padding: 10px; width: 300px;">
        <button onclick="searchDocuments()">Search</button>
        <button onclick="loadDocuments()">Show All</button>
    </div>
    
    <div>
        <h2>Documents</h2>
        <button onclick="loadDocuments()">Refresh List</button>
        <div id="documentList"></div>
    </div>

    <script>
        async function uploadFile() {
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];
            
            if (!file) {
                alert('Please select a file');
                return;
            }
            
            const formData = new FormData();
            formData.append('file', file);
            
            const status = document.getElementById('uploadStatus');
            status.textContent = 'Uploading...';
            
            try {
                const response = await fetch('http://localhost:8000/upload', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                status.textContent = `✓ Uploaded: ${data.filename}`;
                loadDocuments();
            } catch (error) {
                status.textContent = '✗ Upload failed';
                console.error(error);
            }
        }
        
        async function loadDocuments() {
            try {
                const response = await fetch('http://localhost:8000/documents');
                const docs = await response.json();
                
                const list = document.getElementById('documentList');
                list.innerHTML = '';
                
                docs.forEach(doc => {
                    const div = document.createElement('div');
                    div.className = 'document';
                    div.innerHTML = `
                        <strong>${doc.filename}</strong><br>
                        <small>Uploaded: ${new Date(doc.upload_date).toLocaleString()}</small><br>
                        <small>Size: ${(doc.file_size / 1024).toFixed(2)} KB</small><br>
                        <button onclick="viewDocument(${doc.id})">View Content</button>
                        <button onclick="deleteDocument(${doc.id})" style="background: #dc3545;">Delete</button>
                    `;
                    list.appendChild(div);
                });
            } catch (error) {
                console.error('Failed to load documents:', error);
            }
        }

        async function deleteDocument(docId) {
            if (!confirm('Are you sure you want to delete this document?')) {
                return;
            }
            
            try {
                await fetch(`http://localhost:8000/documents/${docId}`, {
                    method: 'DELETE'
                });
                loadDocuments();  // Refresh the list
            } catch (error) {
                console.error('Failed to delete document:', error);
            }
        }

        async function searchDocuments() {
            const query = document.getElementById('searchInput').value;
            
            if (!query) {
                alert('Please enter a search term');
                return;
            }
            
            try {
                const response = await fetch(`http://localhost:8000/search?q=${encodeURIComponent(query)}`);
                const docs = await response.json();
                
                const list = document.getElementById('documentList');
                list.innerHTML = '';
                
                if (docs.length === 0) {
                    list.innerHTML = '<p>No documents found.</p>';
                    return;
                }
                
                docs.forEach(doc => {
                    const div = document.createElement('div');
                    div.className = 'document';
                    div.innerHTML = `
                        <strong>${doc.filename}</strong><br>
                        <small>Match found in document</small><br>
                        <button onclick="viewDocument(${doc.id})">View Content</button>
                    `;
                    list.appendChild(div);
                });
            } catch (error) {
                console.error('Search failed:', error);
            }
        }

        async function viewDocument(docId) {
            try {
                const response = await fetch(`http://localhost:8000/documents/${docId}/content`);
                const data = await response.json();
                
                // Show in alert for now (we'll make it nicer later)
                const preview = data.content.substring(0, 500);
                alert(`${data.filename}\n\n${preview}...`);
            } catch (error) {
                console.error('Failed to load document:', error);
            }
        }
        
        // Load documents on page load
        loadDocuments();
    </script>
</body>
</html>
