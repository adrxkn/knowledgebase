<!DOCTYPE html>
<html>
<head>
    <title>Knowledge Base</title>
    <style>
        body {
            font-family: Arial;
            max-width: 900px;
            margin: 50px auto;
            padding: 20px;
        }

        .section {
            margin-bottom: 30px;
        }

        .upload-section {
            border: 2px dashed #ccc;
            padding: 30px;
            text-align: center;
            margin-bottom: 30px;
        }

        .document {
            border: 1px solid #ddd;
            padding: 15px;
            margin: 10px 0;
            border-radius: 5px;
        }

        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            margin-right: 5px;
        }

        button:hover {
            background: #0056b3;
        }

        .danger {
            background: #dc3545;
        }

        .success {
            background: #28a745;
        }

        input {
            padding: 8px;
            margin-right: 5px;
        }

        #authSection {
            border-bottom: 2px solid #eee;
            padding-bottom: 20px;
        }
    </style>
</head>
<body>

<h1>📚 Knowledge Base with AI</h1>

<!-- AUTH SECTION -->
<div id="authSection" class="section">

    <div id="loginForm">
        <h2>Login</h2>
        <input id="usernameInput" placeholder="Username">
        <input id="passwordInput" type="password" placeholder="Password">
        <button onclick="login()">Login</button>
        <p id="authStatus"></p>
    </div>

    <h3>Register</h3>

    <input id="registerUsername" placeholder="Username">
    <input id="registerEmail" placeholder="Email">
    <input id="registerPassword" type="password" placeholder="Password">

    <button onclick="register()">Register</button>

    <p id="registerStatus"></p>

    <div id="userPanel" style="display:none;">
        <strong>Logged in</strong>
        <button onclick="logout()" class="danger">Logout</button>
    </div>

</div>


<!-- UPLOAD -->
<div id="uploadSection" class="upload-section section" style="display:none;">
    <h2>Upload Document</h2>
    <input type="file" id="fileInput" accept=".pdf,.txt">
    <br><br>
    <button onclick="uploadFile()">Upload</button>
    <p id="uploadStatus"></p>
</div>


<!-- SEARCH -->
<div class="section" id="searchSection" style="display:none;">
    <input type="text" id="searchInput" placeholder="Search documents...">
    <button onclick="searchDocuments()">Search</button>
    <button onclick="loadDocuments()">Show All</button>
</div>


<!-- DOCUMENT LIST -->
<div id="docSection" style="display:none;">
    <h2>Documents</h2>
    <button onclick="loadDocuments()">Refresh</button>
    <div id="documentList"></div>
</div>


<!-- AI Q&A MODAL -->
<div id="qaModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5);">

    <div style="background:white; margin:60px auto; max-width:700px; padding:25px; border-radius:10px;">

        <div style="display:flex; justify-content:space-between;">
            <h2>Ask AI</h2>
            <button onclick="closeQAModal()" class="danger">Close</button>
        </div>

        <p><strong>Document:</strong> <span id="currentDocName"></span></p>

        <input id="questionInput" placeholder="Ask a question..." style="width:100%;">

        <br><br>

        <button onclick="askQuestion()" class="success">Ask AI</button>

        <div id="answerSection" style="display:none; margin-top:20px;">
            <h3>Answer</h3>
            <div id="answerBox"></div>
        </div>

    </div>

</div>


<script>

const API = "http://localhost:8000"

let authToken = localStorage.getItem("token")
let currentDocId = null


function authHeaders() {
    return {
        "Authorization": `Bearer ${authToken}`
    }
}


function showApp() {

    document.getElementById("loginForm").style.display = "none"
    document.getElementById("userPanel").style.display = "block"

    document.getElementById("uploadSection").style.display = "block"
    document.getElementById("searchSection").style.display = "block"
    document.getElementById("docSection").style.display = "block"

}


function logout() {

    localStorage.removeItem("token")
    location.reload()

}


async function login() {

    const username = document.getElementById("usernameInput").value
    const password = document.getElementById("passwordInput").value

    const form = new URLSearchParams()

    form.append("username", username)
    form.append("password", password)

    const response = await fetch(`${API}/login`, {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: form
    })

    const data = await response.json()

    if (data.access_token) {

        authToken = data.access_token
        localStorage.setItem("token", authToken)

        document.getElementById("authStatus").textContent = "✓ Logged in"

        showApp()

        loadDocuments()

    } else {

        document.getElementById("authStatus").textContent = "Login failed"

    }

}

async function register() {

    const username = document.getElementById("registerUsername").value
    const email = document.getElementById("registerEmail").value
    const password = document.getElementById("registerPassword").value

    const response = await fetch(`${API}/register`, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            username: username,
            email: email,
            password: password
        })
    })

    const data = await response.json()

    if (response.ok) {
        document.getElementById("registerStatus").textContent =
            "✓ Registration successful. You can now login."
    } else {
        document.getElementById("registerStatus").textContent =
            "❌ " + data.detail
    }

}

async function uploadFile() {

    const file = document.getElementById("fileInput").files[0]

    if (!file) {
        alert("Select file")
        return
    }

    const formData = new FormData()

    formData.append("file", file)

    const response = await fetch(`${API}/upload`, {
        method: "POST",
        headers: authHeaders(),
        body: formData
    })

    const data = await response.json()

    document.getElementById("uploadStatus").textContent =
        `Uploaded: ${data.filename}`

    loadDocuments()

}


async function loadDocuments() {

    const response = await fetch(`${API}/documents`, {
        headers: authHeaders()
    })

    const docs = await response.json()

    const list = document.getElementById("documentList")

    list.innerHTML = ""

    if (docs.length === 0) {
        list.innerHTML = "<p>No documents</p>"
        return
    }

    docs.forEach(doc => {

        const div = document.createElement("div")

        div.className = "document"

        div.innerHTML = `
            <strong>${doc.filename}</strong><br>
            <small>Size: ${(doc.file_size / 1024).toFixed(2)} KB</small><br><br>
            <button onclick="openQAModal(${doc.id}, '${doc.filename}')" class="success">Ask AI</button>
            <button onclick="deleteDocument(${doc.id})" class="danger">Delete</button>
        `

        list.appendChild(div)

    })

}


async function deleteDocument(id) {

    if (!confirm("Delete document?")) return

    await fetch(`${API}/documents/${id}`, {
        method: "DELETE",
        headers: authHeaders()
    })

    loadDocuments()

}


async function searchDocuments() {

    const q = document.getElementById("searchInput").value

    const response = await fetch(`${API}/search?q=${encodeURIComponent(q)}`, {
        headers: authHeaders()
    })

    const docs = await response.json()

    const list = document.getElementById("documentList")

    list.innerHTML = ""

    docs.forEach(doc => {

        const div = document.createElement("div")

        div.className = "document"

        div.innerHTML = `
            <strong>${doc.filename}</strong><br>
            <button onclick="openQAModal(${doc.id}, '${doc.filename}')" class="success">Ask AI</button>
        `

        list.appendChild(div)

    })

}


function openQAModal(id, name) {

    currentDocId = id

    document.getElementById("currentDocName").textContent = name

    document.getElementById("qaModal").style.display = "block"

}


function closeQAModal() {

    document.getElementById("qaModal").style.display = "none"

}


async function askQuestion() {

    const question = document.getElementById("questionInput").value

    const answerBox = document.getElementById("answerBox")

    const answerSection = document.getElementById("answerSection")

    answerSection.style.display = "block"

    answerBox.innerHTML = "Thinking..."

    const response = await fetch(
        `${API}/documents/${currentDocId}/ask?question=${encodeURIComponent(question)}`,
        {
            method: "POST",
            headers: authHeaders()
        }
    )

    const data = await response.json()

    answerBox.innerHTML = `<p><b>Q:</b> ${data.question}</p>
                           <p><b>A:</b> ${data.answer}</p>`

}


if (authToken) {

    showApp()

    loadDocuments()

}

</script>

</body>
</html>
